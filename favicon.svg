<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="c">
      <circle cx="32" cy="32" r="32"/>
    </clipPath>
  </defs>

  <!-- Fond rose poudre -->
  <circle cx="32" cy="32" r="32" fill="#ECC8D0"/>

  <g clip-path="url(#c)">

    <!-- Ombre portée douce -->
    <path d="M20,17 C20,12 26,11 32,18 C38,11 44,12 44,17 L42,35 L56,65 L8,65 L22,35 Z"
          fill="#5C1F2E" opacity="0.07" transform="translate(1.5,1.5)"/>

    <!-- Corps de la robe — ivoire, trait bordeaux -->
    <path d="M20,17 C20,12 26,11 32,18 C38,11 44,12 44,17 L42,35 L56,65 L8,65 L22,35 Z"
          fill="#FDFAF8" stroke="#5C1F2E" stroke-width="1.2"
          stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Ligne centrale bustier (croquis) -->
    <line x1="32" y1="18.5" x2="32" y2="35"
          stroke="#ECC8D0" stroke-width="0.6" stroke-linecap="round" opacity="0.7"/>

    <!-- Pli gauche jupe -->
    <path d="M31,37 C29,47 27,55 24,64"
          stroke="#C9A57C" stroke-width="0.9" fill="none"
          stroke-linecap="round" opacity="0.55"/>

    <!-- Pli droit jupe -->
    <path d="M33,37 C35,47 37,55 40,64"
          stroke="#C9A57C" stroke-width="0.9" fill="none"
          stroke-linecap="round" opacity="0.55"/>

    <!-- Volant / suggestion dentelle bas de robe -->
    <path d="M12,57 C15,54.5 18,57 21,54.5 C24,52 27,54.5 32,54.5 C37,54.5 40,52 43,54.5 C46,57 49,54.5 52,57"
          stroke="#5C1F2E" stroke-width="0.55" fill="none"
          stroke-linecap="round" opacity="0.3"/>

    <!-- Ceinture or-rose -->
    <rect x="22" y="33.5" width="20" height="3" rx="1.5" fill="#C9A57C"/>

    <!-- Nœud — aile gauche -->
    <path d="M32,35 C30.5,33.2 27.5,33 28,35 C28.5,37 30.5,37.2 32,35 Z"
          fill="#A07040"/>

    <!-- Nœud — aile droite -->
    <path d="M32,35 C33.5,33.2 36.5,33 36,35 C35.5,37 33.5,37.2 32,35 Z"
          fill="#A07040"/>

    <!-- Centre du nœud -->
    <circle cx="32" cy="35" r="2" fill="#5C1F2E"/>
    <circle cx="32" cy="35" r="0.9" fill="#C9A57C"/>

    <!-- Perle au creux du décolleté -->
    <circle cx="32" cy="18.8" r="1.7" fill="#C9A57C"/>
    <circle cx="32" cy="18.8" r="0.75" fill="white" opacity="0.65"/>

  </g>
</svg>
